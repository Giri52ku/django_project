
services:
 db:
  image: postgres:15
  restart: always
  shm_size: 128mb
  env_file:
    - .env
  volumes:
    - postgres_data:/var/lib/postgresql/data
  ports:
    - "5432:5432"
  
 web:
  build: .
  command: python manage.py runserver 0.0.0.0:8000
  volumes:
      - .:/djangoapp
  ports:
      - "8000:8000"
  env_file:
    - .env
  depends_on:
    - db
  
volumes:
  postgres_data: